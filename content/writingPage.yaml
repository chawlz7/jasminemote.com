#   Bold:     <strong>word</strong>
#
# ──────────────────────────────────────────────────────────────


# ── Page header ───────────────────────────────────────────────
page:
  eyebrow: "Writing & Press"
  headline: "Making the science of mental health <em>readable</em>"
  subhead: >-
    I write about psychology, parenting, and mental health for general audiences —
    translating research into something people can actually use. My Substack newsletter,
    <em>Mental Healthy</em>, is where most of my writing lives; the pieces below are
    from other outlets.


# ── Newsletter callout (top of the articles section) ──────────
newsletter_callout:
  kicker: "Newsletter — Free on Substack"
  headline: "Mental Healthy"
  body: >-
    The science of mental health for pregnant people, parents, and everyone in between. I write
    about anxiety, sleep, child development, behavior, and what the research actually
    says — in plain language.
  url: "https://jasminemote.substack.com"
  cta: "Read on Substack →"


# ── Section headings ──────────────────────────────────────────
# Use <em>word</em> around a word to display it in accent color.
# Remove <em> tags entirely for plain headings with no color accent.
sections:
  essays_heading: "Essays & <em>Articles</em>"
  press_heading: "Press & <em>Media</em>"


# ── SEO ───────────────────────────────────────────────────────
# The meta description shown in Google search results and link
# previews. Keep it under 160 characters.
seo:
  description: "Essays, articles, and press coverage by Jasmine Mote, PhD — clinical psychologist and science writer. Published in Scientific American, STAT News, and more."
