# ──────────────────────────────────────────────────────────────
# Writing page content — jasminemote.com/writing/
# Edit this file to update the text on the Writing & Press page.
#
# The writing articles and press items themselves are in:
#   content/writing.json  ← add new articles and press clips there
#
# ── Formatting tags you can use in text fields ────────────────
#
