therapy:
  eyebrow: "For Therapy Clients"
  headline: "Start therapy with Jasmine"
  body: "I see individual clients through Cambridge Psychology Group, a group practice in the greater Boston area. I specialize in perinatal mental health, mood and anxiety concerns, OCD, psychosis, and life transitions — and I bring a researcher's eye to everything I do clinically."
  cpg_url: "https://cambridgepsych.org/clinicians/jasmine-mote/"
