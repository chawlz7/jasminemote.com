statement:
  eyebrow: Research
  headline: "The science of emotion, social connection & serious mental illness"
  body: >
    My research asks a deceptively simple question: how do people with schizophrenia experience
    everyday social life? Using ecological momentary assessment (EMA) and smartphone sensing,
    I study emotion, social motivation, and interpersonal connection in real-world contexts —
    moving beyond the lab to understand how serious mental illness actually shapes daily experience.
    This work spans health disparities, digital health interventions, and the development of
    tools that people living with serious mental illness actually want to use.
  affiliation: "Research Assistant Professor · Boston University Sargent College · AMP Lab"

