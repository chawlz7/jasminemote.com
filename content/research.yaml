statement:
  eyebrow: Research
  headline: "The science of emotion, social connection & mental illness"
  body: >
    How we feel and who we interact with are major factors in our mental health. Using ecological momentary 
    assessment (EMA), smartphone sensing, qualitative, and experimental methods, I study emotion, social motivation, and interpersonal connection
    in real-world contexts, with a focus on these experiences in people with living with psychosis. I'm also interested in addressing racial health 
    disparities in the assessment and treatment of people living with these concerns. I love interdisciplinary collaboration and have worked with psychologists,
    psychiatrists, occupational therapists, veterinary scientists, and psychophysiologists. My work has been funded by the National Institute of Mental Health,
    Eunice Kennedy Shriver National Institute of Child Health and Human Development, Waltham Petcare Science Institute, and the American Psychological Foundation. 
    
    From the lab to your phone, I am dedicated to understanding and addressing the emotional and social difficulties in our everyday lives.
    See below for a summary of main areas of interest and links for all of my publications. 
  affiliation: "Research Assistant Professor · Boston University Sargent College · AMP Lab"

